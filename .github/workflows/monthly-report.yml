name: Monthly Inhouse Hours Report

on:
  schedule:
    - cron: '0 0 15 * *'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google credentials file
        run: |
          echo "${{ secrets.GOOGLE_CREDS }}" | base64 -d > creds.json

      - name: Run report generation script
        env:
          GOOGLE_CREDS_FILE: creds.json

          PROJECT_SHEET_KEY: ${{ secrets.PROJECT_SHEET_KEY }}
          PROJECT_TAB: ${{ secrets.PROJECT_TAB || 'For Internal Report' }}

          INTERNAL_LOG_SHEET_KEY: ${{ secrets.INTERNAL_LOG_SHEET_KEY }}
          INTERNAL_LOG_TAB: ${{ secrets.INTERNAL_LOG_TAB || 'Form Responses 1' }}

          DELIVERY_SHEET_KEY: ${{ secrets.DELIVERY_SHEET_KEY }}
          DELIVERY_WORKSHEET_NAME: ${{ secrets.DELIVERY_WORKSHEET_NAME || 'Team List & Activity' }}
          RESIGNED_WORKSHEET_NAME: ${{ secrets.RESIGNED_WORKSHEET_NAME || 'Resign/Terminated' }}

          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}

          OUTPUT_SHEET_KEY: ${{ secrets.OUTPUT_SHEET_KEY }}
          OUTPUT_SHEET_URL: ${{ secrets.OUTPUT_SHEET_URL }}

          PROJECT_REPORT_TAB: ${{ secrets.PROJECT_REPORT_TAB || 'Project Report' }}
          MERGED_REPORT_TAB: ${{ secrets.MERGED_REPORT_TAB || 'Merged' }}
          TIME_TRACKING_TAB: ${{ secrets.TIME_TRACKING_TAB || 'Time Tracking Hours' }}

          OUTPUT_SUMMARY_WORKSHEET: ${{ secrets.OUTPUT_SUMMARY_WORKSHEET || 'Summary' }}
          OUTPUT_INHOUSE_WORKSHEET: ${{ secrets.OUTPUT_INHOUSE_WORKSHEET || 'Inhouse Report' }}
          OUTPUT_PRESENT_TEAMLIST_WORKSHEET: ${{ secrets.OUTPUT_PRESENT_TEAMLIST_WORKSHEET || 'Present in Team List & Activity' }}
          OUTPUT_NOT_PRESENT_TEAMLIST_WORKSHEET: ${{ secrets.OUTPUT_NOT_PRESENT_TEAMLIST_WORKSHEET || 'Not in Team List & Activity' }}

          REPORT_YEAR_FILTER: ${{ secrets.REPORT_YEAR_FILTER || '2026' }}
          LOG_LEVEL: INFO

        run: |
          python inhouse_members_active_days_and_effective_hour_stats.py

      - name: Clean up credentials
        if: always()
        run: |
          rm -f creds.json